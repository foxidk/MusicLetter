<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Estados Premium - Temas en Vivo</title>
    <style>
        /* Importamos las nuevas tipografías de Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Montserrat:wght@900&family=Poppins:wght@400;700;900&display=swap');

        /* --- VARIABLES GLOBALES PARA CAMBIO EN TIEMPO REAL --- */
        :root {
            --primary-hex: #ff3333;
            --primary-rgb: 255, 51, 51;
            --main-font: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--main-font); /* Ahora todo usa la variable */
        }

        body {
            background-color: #000000; 
            color: #ffffff;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            user-select: none; 
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        #player-frame {
            position: relative; width: 100vw; height: 100vh;
            overflow: hidden; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            background: #030303; container-type: inline-size; 
        }

        #player-frame.vertical-mode {
            aspect-ratio: 9 / 16; height: 95vh; width: auto;
            border-radius: 30px; 
            box-shadow: 0 0 50px rgba(var(--primary-rgb), 0.15), 0 0 100px rgba(0, 0, 0, 1);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        /* --- FONDO AMBIENT MODE --- */
        #ambient-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #171717 100%);
            background-size: cover; background-position: center;
            filter: blur(15px); transform: scale(1.1); z-index: 0;
            transition: background-image 2s ease-in-out;
        }
        #ambient-bg::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); 
        }

        /* --- UI CONFIGURACIÓN (PANTALLA DE INICIO) --- */
        .setup-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(30px);
            display: flex; justify-content: center; align-items: center;
            z-index: 200; transition: opacity 0.4s ease, visibility 0.4s;
            font-family: 'Poppins', sans-serif; /* El panel siempre usa Poppins para que sea legible */
        }
        .setup-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .setup-screen * { font-family: 'Poppins', sans-serif; } /* Forzar fuente en el panel */

        .setup-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 20px; width: 90%; max-width: 700px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 20px;
        }

        .upload-row { display: flex; gap: 15px; }
        .file-upload-wrapper {
            position: relative; flex: 1; height: 60px;
            border: 2px dashed rgba(255,255,255,0.2); border-radius: 10px;
            display: flex; justify-content: center; align-items: center; text-align: center;
            cursor: pointer; transition: all 0.3s; background: rgba(0,0,0,0.2); padding: 0 10px;
        }
        .file-upload-wrapper:hover { border-color: var(--primary-hex); background: rgba(var(--primary-rgb), 0.05); }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-text { color: var(--primary-hex); font-weight: 700; font-size: 0.9rem; pointer-events: none; transition: color 0.3s; }

        .format-selector { display: flex; gap: 15px; margin-bottom: 5px; }
        .format-btn {
            flex: 1; padding: 15px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5); font-weight: 700; border-radius: 10px; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
        }
        .format-btn.active { border-color: var(--primary-hex); color: #ffffff; background: rgba(var(--primary-rgb),0.1); box-shadow: 0 0 15px rgba(var(--primary-rgb),0.2); }

        textarea { 
            width: 100%; height: 160px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 10px; padding: 15px; color: var(--primary-hex); font-family: monospace; resize: none; outline: none; transition: all 0.3s;
        }
        textarea:focus { border-color: var(--primary-hex); }

        .btn-primary { 
            background: #ffffff; color: #000000; border: none; border-radius: 50px; padding: 15px; 
            font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; 
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2); }

        /* --- BARRA DE PROGRESO --- */
        #progress-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.1); z-index: 100;
        }
        #progress-bar {
            height: 100%; width: 0%; background: var(--primary-hex);
            box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.8); transition: width 0.1s linear, background 0.3s;
        }

        .esc-hint {
            position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.3);
            font-size: 0.8rem; font-weight: 700; z-index: 100; letter-spacing: 1px; text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
        }

        /* --- PANEL DE AJUSTES EN VIVO --- */
        .settings-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 150;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 10px 15px; border-radius: 50px; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s; color: white; display: none; text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
        }
        .settings-toggle:hover { background: rgba(255,255,255,0.2); }
        
        .live-settings-panel {
            position: fixed; top: 70px; right: 20px; z-index: 150;
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 15px; width: 250px;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateX(300px); opacity: 0; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none; font-family: 'Poppins', sans-serif;
        }
        .live-settings-panel.open { transform: translateX(0); opacity: 1; pointer-events: auto; }
        
        .live-settings-panel h3 { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Círculos de color */
        .color-options { display: flex; gap: 10px; margin-bottom: 25px; }
        .color-circle { 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; 
            border: 2px solid rgba(255,255,255,0.2); transition: transform 0.2s, box-shadow 0.2s; 
        }
        .color-circle:hover { transform: scale(1.15); }
        .c-red { background: #ff3333; }
        .c-green { background: #1db954; }
        .c-blue { background: #00d2ff; }
        .c-purple { background: #b026ff; }

        /* Botones de fuente */
        .font-options { display: flex; flex-direction: column; gap: 10px; }
        .font-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 10px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 1rem; 
        }
        .font-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--primary-hex); }
        
        .f-poppins { font-family: 'Poppins', sans-serif; font-weight: 900; }
        .f-montserrat { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; }
        .f-bebas { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px;}
        .f-anton { font-family: 'Anton', sans-serif; font-size: 1.1rem; letter-spacing: 1px;}

        /* --- REPRODUCTOR Y LETRAS (ADAPTATIVAS) --- */
        .lyrics-wrapper { height: 100%; width: 100%; position: relative; overflow: hidden; z-index: 10; perspective: 1000px; }
        .lyrics-content { width: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; align-items: center; }

        .lyric-line {
            font-size: 5cqw; font-weight: 900; text-align: center; text-transform: uppercase;
            padding: 6vh 20px; width: 85%; display: flex; justify-content: center; flex-wrap: wrap; 
        }
        .word { display: inline-block; white-space: nowrap; margin-right: 0.25em; }
        
        .char {
            display: inline-block; opacity: 0; 
            transform: translateY(40px) scale(0.7) translateZ(-100px); 
            filter: blur(15px); color: #ffffff; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        .lyric-line.active .char {
            opacity: 1 !important; transform: translateY(0) scale(1.05) translateZ(0) !important; filter: blur(0px) !important;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.3) !important;
        }
        
        .lyric-line.past .char {
            opacity: 0 !important; transform: translateY(-60px) scale(0.6) translateZ(-200px) !important; filter: blur(10px) !important;
            text-shadow: none !important; transition-delay: 0s !important; transition-duration: 0.6s !important; 
        }

        /* Variables CSS aplicadas al color resaltado */
        .word.highlight .char { color: var(--primary-hex) !important; transition: color 0.3s; }
        .lyric-line.active .word.highlight .char { text-shadow: 0 0 20px rgba(var(--primary-rgb), 0.8), 0 0 40px rgba(var(--primary-rgb), 0.4) !important; }
        
        .lyric-line.instrumental .char { animation: breathe 3s infinite ease-in-out; color: rgba(255, 255, 255, 0.4) !important; }

        #player-frame.vertical-mode .lyric-line {
            font-size: 9cqw; padding: 3vh 10px; width: 95%; 
        }
        #player-frame.vertical-mode .lyric-line.active .char { transform: translateY(0) scale(1.1) translateZ(0) !important; }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
            50% { transform: scale(1.1); opacity: 0.8; text-shadow: 0 0 30px rgba(var(--primary-rgb), 0.5); color: var(--primary-hex); }
        }

        /* --- PARTÍCULAS MUSICALES --- */
        #particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .particle { 
            position: absolute; color: rgba(255, 255, 255, 0.15); filter: blur(1px); 
            animation: floatUp ease-in-out forwards; font-family: Arial, sans-serif; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        @keyframes floatUp {
            0% { transform: translateY(10vh) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-60vh) scale(1.8) rotate(45deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            .upload-row { flex-direction: column; }
            .setup-box { padding: 25px; width: 95%; }
            #player-frame.vertical-mode { height: 100vh; width: 100vw; border-radius: 0; border: none; }
        }
    </style>
</head>
<body>

    <div id="player-frame">
        <div id="ambient-bg"></div>
        <div id="particles-container"></div>
        <div class="lyrics-wrapper">
            <div class="lyrics-content" id="lyricsContent"></div>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <!-- BOTÓN Y PANEL DE AJUSTES EN VIVO -->
    <div class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">⚙️ Tema</div>
    <div class="live-settings-panel" id="settingsPanel">
        <h3>Color Neón</h3>
        <div class="color-options">
            <!-- Pasamos HEX y RGB para que la magia de las sombras funcione -->
            <div class="color-circle c-red" onclick="setThemeColor('#ff3333', '255, 51, 51')" title="Rojo Fuego"></div>
            <div class="color-circle c-green" onclick="setThemeColor('#1db954', '29, 185, 84')" title="Verde Spotify"></div>
            <div class="color-circle c-blue" onclick="setThemeColor('#00d2ff', '0, 210, 255')" title="Azul Hielo"></div>
            <div class="color-circle c-purple" onclick="setThemeColor('#b026ff', '176, 38, 255')" title="Violeta Tóxico"></div>
        </div>
        
        <h3>Tipografía</h3>
        <div class="font-options">
            <button class="font-btn f-poppins" onclick="setFont('Poppins')">Poppins (Moderna)</button>
            <button class="font-btn f-montserrat" onclick="setFont('Montserrat')">Montserrat (Elegante)</button>
            <button class="font-btn f-bebas" onclick="setFont('Bebas Neue')">Bebas Neue (TikTok)</button>
            <button class="font-btn f-anton" onclick="setFont('Anton')">Anton (Agresiva)</button>
        </div>
    </div>

    <div class="setup-screen" id="setupScreen">
        <div class="setup-box">
            
            <div class="upload-row">
                <div class="file-upload-wrapper">
                    <span class="file-upload-text" id="fileNameText">1. AUDIO (MP3)</span>
                    <input type="file" id="audioUpload" accept="audio/*">
                </div>
                <div class="file-upload-wrapper">
                    <span class="file-upload-text" id="coverNameText">2. PORTADA (Opcional)</span>
                    <input type="file" id="coverUpload" accept="image/*">
                </div>
            </div>

            <div class="format-selector">
                <button class="format-btn active" id="btn-horizontal" onclick="setFormat('horizontal')">🖥️ Pantalla Completa</button>
                <button class="format-btn" id="btn-vertical" onclick="setFormat('vertical')">📱 Modo Estado (9:16)</button>
            </div>

            <textarea id="lyricsCodeInput" placeholder="3. Pega aquí tu código LRC (Usa *asteriscos* para color)"></textarea>
            <button class="btn-primary" onclick="startImmersiveExperience()">INICIAR GRABACIÓN</button>
            
        </div>
    </div>

    <div class="esc-hint" id="escHint" style="display: none;">ESC para editar</div>
    <audio id="audioElement"></audio>

    <script>
        const audio = document.getElementById('audioElement');
        let parsedLyricsData = [];
        let lineElements = [];
        let currentLineIndex = -1;
        const particlesContainer = document.getElementById('particles-container');
        const progressBar = document.getElementById('progress-bar');
        const setupScreen = document.getElementById('setupScreen');
        const escHint = document.getElementById('escHint');
        const playerFrame = document.getElementById('player-frame');
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsPanel = document.getElementById('settingsPanel');

        // Funciones del Panel en Vivo
        function toggleSettings() {
            settingsPanel.classList.toggle('open');
        }

        function setThemeColor(hex, rgb) {
            document.documentElement.style.setProperty('--primary-hex', hex);
            document.documentElement.style.setProperty('--primary-rgb', rgb);
        }

        function setFont(fontName) {
            document.documentElement.style.setProperty('--main-font', `"${fontName}", sans-serif`);
        }

        let currentFormat = 'horizontal';
        function setFormat(format) {
            currentFormat = format;
            document.getElementById('btn-horizontal').classList.remove('active');
            document.getElementById('btn-vertical').classList.remove('active');
            document.getElementById(`btn-${format}`).classList.add('active');
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' || event.keyCode === 27) {
                if (setupScreen.classList.contains('hidden')) {
                    audio.pause();
                    setupScreen.classList.remove('hidden');
                    escHint.style.display = 'none';
                    settingsToggle.style.display = 'none'; // Ocultar botón de ajustes
                    settingsPanel.classList.remove('open'); // Cerrar panel si estaba abierto
                }
            }
        });

        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileNameText').innerText = file.name.substring(0, 15) + '...';
                audio.src = URL.createObjectURL(file);
            }
        });

        document.getElementById('coverUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('coverNameText').innerText = 'FOTO CARGADA';
                const imageUrl = URL.createObjectURL(file);
                document.getElementById('ambient-bg').style.backgroundImage = `url(${imageUrl})`;
            }
        });

        function parseInputText(text) {
            const results = [];
            const lrcRegex = /\[(\d{2}):(\d{2}(?:\.\d{2,3})?)\](.*)/;
            const lines = text.split('\n');
            lines.forEach(line => {
                const match = line.match(lrcRegex);
                if (match) {
                    const minutes = parseInt(match[1], 10);
                    const seconds = parseFloat(match[2]);
                    const textContent = match[3].trim();
                    results.push({ time: (minutes * 60) + seconds, text: textContent });
                }
            });
            return results;
        }

        function renderLyrics() {
            const lyricsContent = document.getElementById('lyricsContent');
            lyricsContent.innerHTML = ''; 
            lineElements = [];

            const spacerTop = document.createElement('div');
            spacerTop.style.height = '45vh';
            lyricsContent.appendChild(spacerTop);

            parsedLyricsData.forEach((line, index) => {
                const p = document.createElement('p');
                p.className = 'lyric-line future'; 
                p.id = `line-${index}`;
                
                const isInstrumental = line.text === '...' || line.text === '🎶' || line.text === '';
                if(isInstrumental) p.classList.add('instrumental');

                let durationToNext = 3; 
                if (index < parsedLyricsData.length - 1) durationToNext = parsedLyricsData[index + 1].time - line.time;
                durationToNext = Math.min(durationToNext, 3.5); 
                
                const cleanText = line.text.replace(/\*/g, '').replace(/ /g, '');
                const totalChars = cleanText.length;
                let timePerChar = 0;
                if(totalChars > 0 && !isInstrumental) {
                    timePerChar = Math.max(0.04, Math.min((durationToNext * 0.8) / totalChars, 0.12));
                }

                let globalCharIdx = 0;
                const wordsToRender = isInstrumental ? ['...'] : line.text.split(' ');

                wordsToRender.forEach(word => {
                    const wordSpan = document.createElement('span');
                    wordSpan.className = 'word';

                    if (word.includes('*')) {
                        wordSpan.classList.add('highlight');
                        word = word.replace(/\*/g, ''); 
                    }

                    const chars = word.split('');
                    chars.forEach(char => {
                        const charSpan = document.createElement('span');
                        charSpan.className = 'char';
                        charSpan.innerText = char;
                        if(char === ' ') charSpan.innerHTML = '&nbsp;';
                        if(!isInstrumental) charSpan.style.transitionDelay = `${globalCharIdx * timePerChar}s`; 
                        wordSpan.appendChild(charSpan);
                        globalCharIdx++;
                    });
                    p.appendChild(wordSpan);
                });
                lyricsContent.appendChild(p);
                lineElements.push(p);
            });

            const spacerBottom = document.createElement('div');
            spacerBottom.style.height = '45vh';
            lyricsContent.appendChild(spacerBottom);
        }

        function centerActiveLine(activeIndex) {
            if (!lineElements[activeIndex]) return;
            const activeLine = lineElements[activeIndex];
            const containerHeight = playerFrame.clientHeight; 
            const lineOffset = activeLine.offsetTop; 
            const lineHeight = activeLine.clientHeight;
            const translateY = (containerHeight / 2) - lineOffset - (lineHeight / 2);
            document.getElementById('lyricsContent').style.transform = `translateY(${translateY}px)`;
        }

        function spawnParticles() {
            const symbols = ['♪', '♫', '♬'];
            const particleCount = Math.floor(Math.random() * 3) + 2; 

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = symbols[Math.floor(Math.random() * symbols.length)];

                const isLeft = Math.random() > 0.5;
                const positionX = isLeft ? (Math.random() * 10 + 2) : (Math.random() * 10 + 88);
                
                particle.style.left = `${positionX}%`; 
                particle.style.top = `${Math.random() * 20 + 60}%`; 
                
                const sizeBase = currentFormat === 'vertical' ? 5 : 2;
                particle.style.fontSize = `${Math.random() * 2 + sizeBase}cqw`; 
                particle.style.animationDuration = `${Math.random() * 4 + 5}s`; 

                particlesContainer.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 9000); 
            }
        }

        function startImmersiveExperience() {
            const rawCode = document.getElementById('lyricsCodeInput').value;
            if (!audio.src || audio.src === window.location.href) { alert("Sube el archivo de audio primero."); return; }
            if (!rawCode.trim()) { alert("Falta pegar el texto LRC."); return; }

            parsedLyricsData = parseInputText(rawCode);
            if(parsedLyricsData.length === 0) return alert("Error: Formato LRC no detectado.");

            if (currentFormat === 'vertical') {
                playerFrame.classList.add('vertical-mode');
            } else {
                playerFrame.classList.remove('vertical-mode');
            }

            renderLyrics();
            audio.currentTime = 0; 
            
            audio.play().then(() => {
                setupScreen.classList.add('hidden');
                escHint.style.display = 'block'; 
                settingsToggle.style.display = 'block'; // Mostrar el botón de ajustes
                
                currentLineIndex = 0;
                lineElements.forEach(el => el.className = 'lyric-line future');
                lineElements[0].className = 'lyric-line active';
                setTimeout(() => { centerActiveLine(0); spawnParticles(); }, 100); 
            }).catch(e => alert("Interactúa con la página antes de dar clic a Iniciar."));
        }

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            
            if(audio.duration) {
                const progressPercent = (currentTime / audio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
            }

            let activeIndex = 0; 
            for (let i = 0; i < parsedLyricsData.length; i++) {
                if (currentTime >= parsedLyricsData[i].time - 0.2) {
                    activeIndex = i;
                } else {
                    break; 
                }
            }

            if (activeIndex !== currentLineIndex) {
                lineElements.forEach((el, index) => {
                    if (index < activeIndex) { el.className = 'lyric-line past'; } 
                    else if (index === activeIndex) { el.className = 'lyric-line active'; } 
                    else { el.className = 'lyric-line future'; }
                });
                
                centerActiveLine(activeIndex);
                
                if(!lineElements[activeIndex].classList.contains('instrumental')) {
                    spawnParticles();
                }

                currentLineIndex = activeIndex;
            }
        });
    </script>
</body>
</html>
