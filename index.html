<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Premium - Letras y Resaltado Rojo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #030303; 
            color: #ffffff;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            user-select: none; 
            -webkit-user-select: none;
        }

        /* --- UI CONFIGURACIÓN --- */
        .setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #171717 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .setup-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .setup-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 60px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }

        /* Cambiamos los detalles verdes por rojo también en la interfaz */
        .file-upload-wrapper:hover { border-color: #ff3333; background: rgba(255, 51, 51, 0.05); }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-text { color: #ff3333; font-weight: 700; pointer-events: none; }

        .panel { display: flex; flex-direction: column; gap: 15px; }

        /* Recordatorio de comando */
        .helper-text {
            background: rgba(255, 51, 51, 0.1);
            border-left: 4px solid #ff3333;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }
        .helper-text span {
            color: #ff3333;
            font-weight: 900;
        }

        textarea { 
            width: 100%; 
            height: 200px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 10px; 
            padding: 15px; 
            color: #ff3333; 
            font-family: monospace; 
            resize: none; 
            outline: none; 
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: #ff3333; }

        .btn-primary { 
            background: #ffffff; 
            color: #000000; 
            border: none; 
            border-radius: 50px; 
            padding: 15px; 
            font-size: 1rem; 
            font-weight: 900; 
            cursor: pointer; 
            transition: all 0.3s; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2); }

        /* --- REPRODUCTOR INMERSIVO --- */
        .lyrics-wrapper { height: 100vh; width: 100vw; position: relative; overflow: hidden; }
        .lyrics-content { width: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; align-items: center; }

        .lyric-line {
            font-size: 5vw; 
            font-weight: 900; 
            text-align: center;
            text-transform: uppercase;
            padding: 6vh 20px; 
            width: 90%; 
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
        }

        .word {
            display: inline-block;
            white-space: nowrap; 
            margin-right: 0.25em; 
        }

        .char {
            display: inline-block;
            opacity: 0; 
            transform: translateY(20px) scale(0.8);
            filter: blur(10px);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        .lyric-line.active .char {
            opacity: 1 !important;
            transform: translateY(0) scale(1.05) !important;
            filter: blur(0px) !important;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.4) !important;
        }

        .lyric-line.past .char {
            opacity: 0.15 !important;
            transform: translateY(0) scale(0.9) !important;
            filter: blur(4px) !important;
            text-shadow: none !important;
            transition-delay: 0s !important; 
            transition-duration: 0.5s !important; 
        }

        /* --- PALABRAS RESALTADAS EN ROJO NEÓN --- */
        .word.highlight .char {
            color: #ff3333 !important;
        }
        .lyric-line.active .word.highlight .char {
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.8), 0 0 40px rgba(255, 51, 51, 0.4) !important;
        }

        @media (max-width: 768px) {
            .setup-box { padding: 25px; width: 95%; }
            .lyric-line { font-size: 8vw; padding: 5vh 10px; }
        }
    </style>
</head>
<body>

    <div class="setup-screen" id="setupScreen">
        <div class="setup-box">
            <div class="file-upload-wrapper">
                <span class="file-upload-text" id="fileNameText">1. SELECCIONA TU ARCHIVO MP3</span>
                <input type="file" id="audioUpload" accept="audio/mp3,audio/wav">
            </div>

            <div class="panel" id="panel-play">
                <!-- Cajita de recordatorio del comando -->
                <div class="helper-text">
                    💡 <b>Comando de color:</b> Envuelve cualquier palabra entre asteriscos para que se pinte de rojo.<br>
                    Ejemplo: <i>Me has dejado <span>*hecha*</span> <span>*pedazos*</span></i>
                </div>

                <textarea id="lyricsCodeInput" placeholder="2. Pega aquí tu código LRC sacado de Lyricsify o internet..."></textarea>
                
                <button class="btn-primary" onclick="startImmersiveExperience()">INICIAR MODO INMERSIVO</button>
            </div>
        </div>
    </div>

    <audio id="audioElement"></audio>

    <div class="lyrics-wrapper">
        <div class="lyrics-content" id="lyricsContent"></div>
    </div>

    <script>
        const audio = document.getElementById('audioElement');
        let parsedLyricsData = [];
        let lineElements = [];
        let currentLineIndex = -1;

        // Mostrar nombre del archivo al subir
        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileNameText').innerText = file.name;
                audio.src = URL.createObjectURL(file);
            }
        });

        // Convertir formato LRC a datos usables
        function parseInputText(text) {
            const results = [];
            const lrcRegex = /\[(\d{2}):(\d{2}(?:\.\d{2,3})?)\](.*)/;
            const lines = text.split('\n');
            
            lines.forEach(line => {
                const match = line.match(lrcRegex);
                if (match) {
                    const minutes = parseInt(match[1], 10);
                    const seconds = parseFloat(match[2]);
                    const textContent = match[3].trim();
                    if(textContent) {
                        results.push({ time: (minutes * 60) + seconds, text: textContent });
                    }
                }
            });
            return results;
        }

        // Crear las líneas y separar por palabras/letras
        function renderLyrics() {
            const lyricsContent = document.getElementById('lyricsContent');
            lyricsContent.innerHTML = ''; 
            lineElements = [];

            const spacerTop = document.createElement('div');
            spacerTop.style.height = '45vh';
            lyricsContent.appendChild(spacerTop);

            parsedLyricsData.forEach((line, index) => {
                const p = document.createElement('p');
                p.className = 'lyric-line future'; 
                p.id = `line-${index}`;
                
                let durationToNext = 3; 
                if (index < parsedLyricsData.length - 1) {
                    durationToNext = parsedLyricsData[index + 1].time - line.time;
                }
                durationToNext = Math.min(durationToNext, 3.5); 
                
                const cleanText = line.text.replace(/\*/g, '').replace(/ /g, '');
                const totalChars = cleanText.length;
                let timePerChar = 0;
                
                if(totalChars > 0) {
                    timePerChar = (durationToNext * 0.8) / totalChars;
                    timePerChar = Math.max(0.04, Math.min(timePerChar, 0.12));
                }

                let globalCharIdx = 0;
                const words = line.text.split(' ');

                words.forEach(word => {
                    const wordSpan = document.createElement('span');
                    wordSpan.className = 'word';

                    // Detectar palabra con asteriscos para resaltado rojo
                    if (word.includes('*')) {
                        wordSpan.classList.add('highlight');
                        word = word.replace(/\*/g, ''); // Quitamos los asteriscos
                    }

                    const chars = word.split('');
                    chars.forEach(char => {
                        const charSpan = document.createElement('span');
                        charSpan.className = 'char';
                        charSpan.innerText = char;
                        charSpan.style.transitionDelay = `${globalCharIdx * timePerChar}s`; 
                        wordSpan.appendChild(charSpan);
                        globalCharIdx++;
                    });

                    p.appendChild(wordSpan);
                });

                lyricsContent.appendChild(p);
                lineElements.push(p);
            });

            const spacerBottom = document.createElement('div');
            spacerBottom.style.height = '45vh';
            lyricsContent.appendChild(spacerBottom);
        }

        // Centrar pantalla
        function centerActiveLine(activeIndex) {
            if (!lineElements[activeIndex]) return;
            const activeLine = lineElements[activeIndex];
            const containerHeight = window.innerHeight;
            const lineOffset = activeLine.offsetTop; 
            const lineHeight = activeLine.clientHeight;
            
            const translateY = (containerHeight / 2) - lineOffset - (lineHeight / 2);
            document.getElementById('lyricsContent').style.transform = `translateY(${translateY}px)`;
        }

        // Iniciar todo
        function startImmersiveExperience() {
            const rawCode = document.getElementById('lyricsCodeInput').value;
            
            if (!audio.src || audio.src === window.location.href) { alert("Falta el MP3."); return; }
            if (!rawCode.trim()) { alert("Falta pegar el texto LRC."); return; }

            parsedLyricsData = parseInputText(rawCode);
            if(parsedLyricsData.length === 0) {
                alert("Error: Asegúrate de que el texto tenga el formato LRC correcto [00:00.00]");
                return;
            }

            renderLyrics();
            audio.currentTime = 0; 
            
            audio.play().then(() => {
                document.getElementById('setupScreen').classList.add('hidden');
                currentLineIndex = 0;
                lineElements.forEach(el => el.className = 'lyric-line future');
                lineElements[0].className = 'lyric-line active';
                setTimeout(() => { centerActiveLine(0); }, 50);
            }).catch(e => alert("Tu navegador bloqueó el audio. Haz clic en cualquier parte de la página primero."));
        }

        // Sincronización en vivo
        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            let activeIndex = 0; 
            
            for (let i = 0; i < parsedLyricsData.length; i++) {
                if (currentTime >= parsedLyricsData[i].time - 0.2) {
                    activeIndex = i;
                } else {
                    break; 
                }
            }

            if (activeIndex !== currentLineIndex) {
                lineElements.forEach((el, index) => {
                    if (index < activeIndex) { el.className = 'lyric-line past'; } 
                    else if (index === activeIndex) { el.className = 'lyric-line active'; } 
                    else { el.className = 'lyric-line future'; }
                });
                centerActiveLine(activeIndex);
                currentLineIndex = activeIndex;
            }
        });
    </script>
</body>
</html>
