<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Premium - Velocidad Dinámica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #030303; 
            color: #ffffff;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            user-select: none; 
            -webkit-user-select: none;
        }

        /* --- UI CONFIGURACIÓN --- */
        .setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #171717 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .setup-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .setup-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 60px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }

        .file-upload-wrapper:hover { border-color: #1db954; background: rgba(29, 185, 84, 0.05); }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-text { color: #1db954; font-weight: 700; pointer-events: none; }

        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 700; color: rgba(255,255,255,0.4); transition: all 0.3s; text-transform: uppercase; }
        .tab.active { color: #ffffff; border-bottom: 3px solid #1db954; }

        .panel { display: none; flex-direction: column; gap: 15px; }
        .panel.active { display: flex; }

        textarea { width: 100%; height: 200px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; color: #1db954; font-family: monospace; resize: none; outline: none; }
        textarea:focus { border-color: #1db954; }

        .btn-primary { background: #ffffff; color: #000000; border: none; border-radius: 50px; padding: 15px; font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
        .btn-sync { background: #1db954; color: white; }
        .btn-sync:hover { background: #1ed760; box-shadow: 0 10px 30px rgba(29, 185, 84, 0.4); }

        .sync-live-ui { display: none; text-align: center; padding: 20px; background: rgba(29, 185, 84, 0.1); border-radius: 10px; border: 1px solid rgba(29, 185, 84, 0.3); }
        .sync-instruction { color: #1db954; font-weight: 700; margin-bottom: 15px; }
        .sync-current { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .sync-next { color: rgba(255,255,255,0.5); font-size: 0.9rem; }

        /* --- REPRODUCTOR INMERSIVO --- */
        .lyrics-wrapper { height: 100vh; width: 100vw; position: relative; overflow: hidden; }
        .lyrics-content { width: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; align-items: center; }

        .lyric-line {
            font-size: 5vw; 
            font-weight: 900; 
            text-align: center;
            text-transform: uppercase;
            padding: 6vh 20px; 
            width: 90%; 
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
        }

        /* Letra futura */
        .lyric-line span {
            display: inline-block;
            opacity: 0; 
            transform: translateY(20px) scale(0.8);
            filter: blur(10px);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        /* Letra activa */
        .lyric-line.active span {
            opacity: 1 !important;
            transform: translateY(0) scale(1.05) !important;
            filter: blur(0px) !important;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.4) !important;
        }

        /* Letra pasada */
        .lyric-line.past span {
            opacity: 0.15 !important;
            transform: translateY(0) scale(0.9) !important;
            filter: blur(4px) !important;
            text-shadow: none !important;
            transition-delay: 0s !important; 
            transition-duration: 0.5s !important; 
        }

        @media (max-width: 768px) {
            .setup-box { padding: 25px; width: 95%; }
            .lyric-line { font-size: 8vw; padding: 5vh 10px; }
        }
    </style>
</head>
<body>

    <div class="setup-screen" id="setupScreen">
        <div class="setup-box">
            
            <div class="file-upload-wrapper">
                <span class="file-upload-text" id="fileNameText">SELECCIONA TU ARCHIVO MP3</span>
                <input type="file" id="audioUpload" accept="audio/mp3,audio/wav">
            </div>

            <div class="tabs">
                <div class="tab" onclick="switchTab('sync')" id="tab-sync">Sincronizar Manual</div>
                <div class="tab active" onclick="switchTab('play')" id="tab-play">Pegar LRC (Fácil)</div>
            </div>

            <div class="panel" id="panel-sync">
                <textarea id="rawLyrics" placeholder="Pega la letra aquí. Una frase por línea."></textarea>
                <button class="btn-primary btn-sync" id="btnStartSync" onclick="startSyncProcess()">Empezar a Sincronizar</button>
                <div class="sync-live-ui" id="syncLiveUI">
                    <div class="sync-instruction">PRESIONA ESPACIO AL ESCUCHAR LA FRASE</div>
                    <div class="sync-current" id="syncCurrentLine">Cargando...</div>
                    <div class="sync-next" id="syncNextLine">Siguiente: ...</div>
                </div>
            </div>

            <div class="panel active" id="panel-play">
                <textarea id="lyricsCodeInput" placeholder="Pega aquí el código que copiaste de internet en formato .LRC (Ej: [00:15.30] Letra de la cancion) o el código autogenerado."></textarea>
                <button class="btn-primary" onclick="startImmersiveExperience()">INICIAR MODO INMERSIVO</button>
            </div>

        </div>
    </div>

    <audio id="audioElement"></audio>

    <div class="lyrics-wrapper">
        <div class="lyrics-content" id="lyricsContent"></div>
    </div>

    <script>
        const audio = document.getElementById('audioElement');
        let parsedLyricsData = [];
        let lineElements = [];
        let currentLineIndex = -1;
        let isSyncing = false;
        let rawLines = [], syncIndex = 0, syncedData = [];

        function switchTab(tabId) {
            document.getElementById('tab-sync').classList.remove('active');
            document.getElementById('tab-play').classList.remove('active');
            document.getElementById('panel-sync').classList.remove('active');
            document.getElementById('panel-play').classList.remove('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`panel-${tabId}`).classList.add('active');
        }

        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileNameText').innerText = file.name;
                audio.src = URL.createObjectURL(file);
            }
        });

        // --- EXTRACTOR UNIVERSAL DE TEXTOS (LRC o JSON) ---
        function parseInputText(text) {
            const results = [];
            // Intentar leer formato LRC estándar: [00:15.30] Texto
            const lrcRegex = /\[(\d{2}):(\d{2}(?:\.\d{2,3})?)\](.*)/;
            const lines = text.split('\n');
            
            let isLRC = false;
            lines.forEach(line => {
                const match = line.match(lrcRegex);
                if (match) {
                    isLRC = true;
                    const minutes = parseInt(match[1], 10);
                    const seconds = parseFloat(match[2]);
                    const textContent = match[3].trim();
                    if(textContent) {
                        results.push({ time: (minutes * 60) + seconds, text: textContent });
                    }
                }
            });

            if(isLRC && results.length > 0) return results;

            // Si no es LRC, intentar evaluar como el array JSON antiguo
            try {
                const startIndex = text.indexOf('[');
                const endIndex = text.lastIndexOf(']');
                if(startIndex !== -1 && endIndex !== -1) {
                    const arrayString = text.substring(startIndex, endIndex + 1);
                    const evalData = eval('(' + arrayString + ')');
                    if (Array.isArray(evalData) && evalData.length > 0) return evalData;
                }
            } catch(e) {}

            return [];
        }

        // --- RENDERIZADO LETRA POR LETRA CON VELOCIDAD DINÁMICA ---
        function renderLyrics() {
            const lyricsContent = document.getElementById('lyricsContent');
            lyricsContent.innerHTML = ''; 
            lineElements = [];

            const spacerTop = document.createElement('div');
            spacerTop.style.height = '45vh';
            lyricsContent.appendChild(spacerTop);

            parsedLyricsData.forEach((line, index) => {
                const p = document.createElement('p');
                p.className = 'lyric-line future'; 
                p.id = `line-${index}`;
                
                // MÁGIA: Calculamos el tiempo disponible hasta la siguiente frase
                let durationToNext = 3; // 3 segundos por defecto si es la última
                if (index < parsedLyricsData.length - 1) {
                    durationToNext = parsedLyricsData[index + 1].time - line.time;
                }
                
                // Evitamos que frases con pausas muy largas sean hiper lentas
                durationToNext = Math.min(durationToNext, 3.5); 
                
                const chars = line.text.split('');
                // Repartimos el 80% del tiempo disponible entre todas las letras
                let timePerChar = (durationToNext * 0.8) / chars.length;
                
                // Límites: Que no se vea tan rápido que parezca un golpe, ni tan lento que aburra
                timePerChar = Math.max(0.04, Math.min(timePerChar, 0.12));

                chars.forEach((char, charIdx) => {
                    const span = document.createElement('span');
                    span.innerText = char;
                    if(char === ' ') span.innerHTML = '&nbsp;'; 
                    span.style.transitionDelay = `${charIdx * timePerChar}s`; 
                    p.appendChild(span);
                });

                lyricsContent.appendChild(p);
                lineElements.push(p);
            });

            const spacerBottom = document.createElement('div');
            spacerBottom.style.height = '45vh';
            lyricsContent.appendChild(spacerBottom);
        }

        function centerActiveLine(activeIndex) {
            if (!lineElements[activeIndex]) return;
            const activeLine = lineElements[activeIndex];
            const containerHeight = window.innerHeight;
            const lineOffset = activeLine.offsetTop; 
            const lineHeight = activeLine.clientHeight;
            
            const translateY = (containerHeight / 2) - lineOffset - (lineHeight / 2);
            document.getElementById('lyricsContent').style.transform = `translateY(${translateY}px)`;
        }

        function startImmersiveExperience() {
            const rawCode = document.getElementById('lyricsCodeInput').value;
            
            if (!audio.src || audio.src === window.location.href) { alert("Falta el MP3."); return; }
            if (!rawCode.trim()) { alert("Falta el texto de las letras."); return; }

            parsedLyricsData = parseInputText(rawCode);
            if(parsedLyricsData.length === 0) {
                alert("Error crítico. No se detectó formato LRC ni código válido.");
                return;
            }

            renderLyrics();
            audio.currentTime = 0; 
            
            audio.play().then(() => {
                document.getElementById('setupScreen').classList.add('hidden');
                currentLineIndex = 0;
                lineElements.forEach(el => el.className = 'lyric-line future');
                lineElements[0].className = 'lyric-line active';
                setTimeout(() => { centerActiveLine(0); }, 50);
            }).catch(e => alert("Tu navegador bloqueó el audio."));
        }

        audio.addEventListener('timeupdate', () => {
            if(isSyncing) return; 
            
            const currentTime = audio.currentTime;
            let activeIndex = 0; 
            
            for (let i = 0; i < parsedLyricsData.length; i++) {
                if (currentTime >= parsedLyricsData[i].time - 0.2) {
                    activeIndex = i;
                } else {
                    break; 
                }
            }

            if (activeIndex !== currentLineIndex) {
                lineElements.forEach((el, index) => {
                    if (index < activeIndex) { el.className = 'lyric-line past'; } 
                    else if (index === activeIndex) { el.className = 'lyric-line active'; } 
                    else { el.className = 'lyric-line future'; }
                });
                centerActiveLine(activeIndex);
                currentLineIndex = activeIndex;
            }
        });

        // (Lógica del sincronizador manual reducida para ahorrar espacio visual, sigue 100% funcional)
        function startSyncProcess() {
            if (!audio.src || audio.src === window.location.href) return alert("Sube un MP3.");
            rawLines = document.getElementById('rawLyrics').value.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
            if (rawLines.length === 0) return alert("Pega letra.");
            document.getElementById('rawLyrics').style.display = 'none';
            document.getElementById('btnStartSync').style.display = 'none';
            document.getElementById('syncLiveUI').style.display = 'block';
            syncIndex = 0; syncedData = []; isSyncing = true; updateSyncUI();
            document.activeElement.blur(); audio.currentTime = 0; audio.play();
        }
        function updateSyncUI() {
            if (syncIndex < rawLines.length) {
                document.getElementById('syncCurrentLine').innerText = rawLines[syncIndex];
                document.getElementById('syncNextLine').innerText = (syncIndex + 1 < rawLines.length) ? `Sig: ${rawLines[syncIndex + 1]}` : "Fin";
            } else { finishSync(); }
        }
        function finishSync() {
            isSyncing = false; audio.pause();
            let code = ""; syncedData.forEach(item => {
                let min = Math.floor(item.time / 60).toString().padStart(2, '0');
                let sec = (item.time % 60).toFixed(2).padStart(5, '0');
                code += `[${min}:${sec}] ${item.text}\n`;
            });
            document.getElementById('lyricsCodeInput').value = code;
            switchTab('play');
            document.getElementById('rawLyrics').style.display = 'block';
            document.getElementById('btnStartSync').style.display = 'block';
            document.getElementById('syncLiveUI').style.display = 'none';
        }
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && isSyncing) {
                e.preventDefault();
                if (syncIndex < rawLines.length) {
                    syncedData.push({ time: audio.currentTime, text: rawLines[syncIndex] });
                    syncIndex++; updateSyncUI();
                }
            }
        });
    </script>
</body>
</html>
