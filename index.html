<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Premium - Motor Blindado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #030303; 
            color: #ffffff;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            user-select: none; 
            -webkit-user-select: none;
        }

        /* --- PANEL DE CONFIGURACIÓN --- */
        .setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #171717 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .setup-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .setup-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 60px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }

        .file-upload-wrapper:hover {
            border-color: #1db954;
            background: rgba(29, 185, 84, 0.05);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: #1db954;
            font-weight: 700;
            pointer-events: none;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tab.active {
            color: #ffffff;
            border-bottom: 3px solid #1db954;
        }

        .panel {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .panel.active {
            display: flex;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-family: monospace;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: #1db954; }
        #lyricsCodeInput { color: #1db954; }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 50px;
            padding: 15px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }

        .btn-sync { background: #1db954; color: white; }
        .btn-sync:hover { background: #1ed760; box-shadow: 0 10px 30px rgba(29, 185, 84, 0.4); }

        .sync-live-ui {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(29, 185, 84, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(29, 185, 84, 0.3);
        }
        
        .sync-instruction { color: #1db954; font-weight: 700; margin-bottom: 15px; }
        .sync-current { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .sync-next { color: rgba(255,255,255,0.5); font-size: 0.9rem; }

        /* --- REPRODUCTOR INMERSIVO --- */
        .lyrics-wrapper {
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            align-items: center; 
        }

        .lyrics-content {
            width: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Letra Inactiva */
        .lyric-line {
            font-size: 3.5vw; 
            font-weight: 700; 
            color: rgba(255, 255, 255, 0.15); 
            text-align: center;
            transition: all 0.3s ease-out;
            text-transform: uppercase;
            padding: 6vh 20px; 
            filter: blur(4px); 
            opacity: 0.4;
            width: 90%; 
        }

        /* LETRA ACTIVA BLINDADA CON !IMPORTANT */
        .lyric-line.active {
            color: #ffffff !important;
            font-weight: 900 !important;
            font-size: 5.5vw !important; 
            transform: scale(1.05) !important;
            filter: blur(0px) !important; 
            opacity: 1 !important;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.3) !important; 
        }

        @media (max-width: 768px) {
            .setup-box { padding: 25px; width: 95%; }
            .lyric-line { font-size: 6vw; padding: 5vh 10px; }
            .lyric-line.active { font-size: 9vw !important; }
        }
    </style>
</head>
<body>

    <div class="setup-screen" id="setupScreen">
        <div class="setup-box">
            
            <div class="file-upload-wrapper">
                <span class="file-upload-text" id="fileNameText">SELECCIONA TU ARCHIVO MP3</span>
                <input type="file" id="audioUpload" accept="audio/mp3,audio/wav">
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('sync')" id="tab-sync">1. Crear Tiempos</div>
                <div class="tab" onclick="switchTab('play')" id="tab-play">2. Reproductor</div>
            </div>

            <div class="panel active" id="panel-sync">
                <textarea id="rawLyrics" placeholder="Pega la letra de tu canción aquí. Una frase por línea."></textarea>
                <button class="btn-primary btn-sync" id="btnStartSync" onclick="startSyncProcess()">Empezar a Sincronizar</button>
                
                <div class="sync-live-ui" id="syncLiveUI">
                    <div class="sync-instruction">PRESIONA LA BARRA ESPACIADORA AL ESCUCHAR LA FRASE</div>
                    <div class="sync-current" id="syncCurrentLine">Cargando...</div>
                    <div class="sync-next" id="syncNextLine">Siguiente: ...</div>
                </div>
            </div>

            <div class="panel" id="panel-play">
                <textarea id="lyricsCodeInput" placeholder="Pega aquí el código que copiaste."></textarea>
                <button class="btn-primary" onclick="startImmersiveExperience()">INICIAR MODO INMERSIVO</button>
            </div>

        </div>
    </div>

    <audio id="audioElement"></audio>

    <div class="lyrics-wrapper">
        <div class="lyrics-content" id="lyricsContent"></div>
    </div>

    <script>
        const audio = document.getElementById('audioElement');
        let parsedLyricsData = [];
        let lineElements = [];
        let currentLineIndex = -1;

        let rawLines = [];
        let syncIndex = 0;
        let syncedData = [];
        let isSyncing = false;

        function switchTab(tabId) {
            document.getElementById('tab-sync').classList.remove('active');
            document.getElementById('tab-play').classList.remove('active');
            document.getElementById('panel-sync').classList.remove('active');
            document.getElementById('panel-play').classList.remove('active');

            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`panel-${tabId}`).classList.add('active');
        }

        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileNameText').innerText = file.name;
                audio.src = URL.createObjectURL(file);
            }
        });

        // --- LÓGICA DEL SINCRONIZADOR ---
        function startSyncProcess() {
            if (!audio.src || audio.src === window.location.href) {
                alert("Primero debes seleccionar un archivo MP3.");
                return;
            }
            const rawText = document.getElementById('rawLyrics').value;
            rawLines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            if (rawLines.length === 0) {
                alert("Pega alguna letra en el cuadro primero.");
                return;
            }

            document.getElementById('rawLyrics').style.display = 'none';
            document.getElementById('btnStartSync').style.display = 'none';
            document.getElementById('syncLiveUI').style.display = 'block';
            
            syncIndex = 0;
            syncedData = [];
            isSyncing = true;
            updateSyncUI();

            document.activeElement.blur(); 
            audio.currentTime = 0;
            audio.play();
        }

        function updateSyncUI() {
            if (syncIndex < rawLines.length) {
                document.getElementById('syncCurrentLine').innerText = rawLines[syncIndex];
                document.getElementById('syncNextLine').innerText = 
                    (syncIndex + 1 < rawLines.length) ? `Sig: ${rawLines[syncIndex + 1]}` : "Última línea";
            } else {
                finishSync();
            }
        }

        function finishSync() {
            isSyncing = false;
            audio.pause();
            
            let code = "const lyricsData = [\n";
            syncedData.forEach((item, idx) => {
                const isLast = idx === syncedData.length - 1;
                const safeText = item.text.replace(/"/g, '\\"');
                code += `    { time: ${item.time}, text: "${safeText}" }${isLast ? '' : ','}\n`;
            });
            code += "];";

            document.getElementById('lyricsCodeInput').value = code;
            switchTab('play');

            document.getElementById('rawLyrics').style.display = 'block';
            document.getElementById('btnStartSync').style.display = 'block';
            document.getElementById('syncLiveUI').style.display = 'none';
        }

        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space' && isSyncing) {
                event.preventDefault(); 
                if (syncIndex < rawLines.length) {
                    const time = parseFloat(audio.currentTime.toFixed(1));
                    syncedData.push({ time: time, text: rawLines[syncIndex] });
                    syncIndex++;
                    updateSyncUI();
                }
            }
        });

        // --- LÓGICA DEL REPRODUCTOR BLINDADO ---
        function renderLyrics() {
            const lyricsContent = document.getElementById('lyricsContent');
            lyricsContent.innerHTML = ''; 
            lineElements = [];

            const spacerTop = document.createElement('div');
            spacerTop.style.height = '45vh';
            lyricsContent.appendChild(spacerTop);

            parsedLyricsData.forEach((line, index) => {
                const p = document.createElement('p');
                p.className = 'lyric-line';
                p.id = `line-${index}`;
                p.innerText = line.text;
                lyricsContent.appendChild(p);
                lineElements.push(p);
            });

            const spacerBottom = document.createElement('div');
            spacerBottom.style.height = '45vh';
            lyricsContent.appendChild(spacerBottom);
        }

        // Usamos window.innerHeight para que la caja negra no arruine las matemáticas
        function centerActiveLine(activeIndex) {
            if (!lineElements[activeIndex]) return;
            const activeLine = lineElements[activeIndex];
            const containerHeight = window.innerHeight;
            const lineOffset = activeLine.offsetTop;
            const lineHeight = activeLine.clientHeight;
            
            const translateY = (containerHeight / 2) - lineOffset - (lineHeight / 2);
            document.getElementById('lyricsContent').style.transform = `translateY(${translateY}px)`;
        }

        function startImmersiveExperience() {
            const rawCode = document.getElementById('lyricsCodeInput').value;
            
            if (!audio.src || audio.src === window.location.href) {
                alert("Falta seleccionar el archivo MP3.");
                return;
            }
            if (!rawCode.trim()) {
                alert("Falta el código de los tiempos.");
                return;
            }

            // Extracción segura (Busca estrictamente lo que está entre [ y ])
            try {
                const startIndex = rawCode.indexOf('[');
                const endIndex = rawCode.lastIndexOf(']');
                if(startIndex === -1 || endIndex === -1) throw new Error("No hay corchetes");
                
                const arrayString = rawCode.substring(startIndex, endIndex + 1);
                parsedLyricsData = eval('(' + arrayString + ')');
                
                if (!Array.isArray(parsedLyricsData) || parsedLyricsData.length === 0) throw new Error("Arreglo vacío");
            } catch (error) {
                alert("Error crítico al leer el código. Asegúrate de pegar desde el [ hasta el ]");
                return;
            }

            renderLyrics();
            audio.currentTime = 0; 
            
            audio.play().then(() => {
                document.getElementById('setupScreen').classList.add('hidden');
                
                // Forzamos la clase activa de forma inmediata
                currentLineIndex = 0;
                lineElements.forEach(el => el.classList.remove('active'));
                lineElements[0].classList.add('active');
                
                setTimeout(() => {
                    centerActiveLine(0);
                }, 50);

            }).catch(e => alert("Tu navegador bloqueó el audio. Intenta interactuar con la página primero."));
        }

        // MOTOR DE ACTUALIZACIÓN AGRESIVO
        audio.addEventListener('timeupdate', () => {
            if(isSyncing) return; 
            
            const currentTime = audio.currentTime;
            let activeIndex = 0; 
            
            // Permitimos un margen de 0.2 segundos para que la transición se vea más natural
            for (let i = 0; i < parsedLyricsData.length; i++) {
                if (currentTime >= parsedLyricsData[i].time - 0.2) {
                    activeIndex = i;
                } else {
                    break; 
                }
            }

            // Actualizamos SOLO si el índice cambió para no saturar el rendimiento,
            // PERO usamos fuerza bruta limpiando y añadiendo clases a todos.
            if (activeIndex !== currentLineIndex) {
                
                lineElements.forEach((el, index) => {
                    if (index === activeIndex) {
                        el.classList.add('active');
                    } else {
                        el.classList.remove('active');
                    }
                });

                centerActiveLine(activeIndex);
                currentLineIndex = activeIndex;
            }
        });
    </script>
</body>
</html>
